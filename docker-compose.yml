services:
  app:
    build: .
    container_name: aethera-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER:-aethera}:${MONGO_PASS}@mongo:27017/aethera?authSource=admin
    volumes:
      # Docker socket — required for container orchestration
      - /var/run/docker.sock:/var/run/docker.sock
      # Server data directories (must match inside & outside the container)
      - ${AETHERA_DATA_DIR:-/app/.aethera/run}:${AETHERA_DATA_DIR:-/app/.aethera/run}
      - ${AETHERA_BACKUP_DIR:-/app/.aethera/backup}:${AETHERA_BACKUP_DIR:-/app/.aethera/backup}
      - ${AETHERA_WORLD_UPLOAD_DIR:-/app/.aethera/world_upload}:${AETHERA_WORLD_UPLOAD_DIR:-/app/.aethera/world_upload}
    mem_limit: ${APP_MEM_LIMIT:-1g}
    memswap_limit: ${APP_MEM_LIMIT:-1g}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - aethera-net

  mongo:
    image: mongo:7
    container_name: aethera-mongo
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-aethera}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    volumes:
      - mongo-data:/data/db
    mem_limit: ${MONGO_MEM_LIMIT:-512m}
    memswap_limit: ${MONGO_MEM_LIMIT:-512m}
    healthcheck:
      test: >-
        mongosh -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --quiet --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aethera-net

volumes:
  mongo-data:

networks:
  aethera-net:
    name: aethera-net
    driver: bridge
